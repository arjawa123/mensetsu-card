<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mensetsu Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- GLOBAL HEADER -->
        <div class="global-header">
            <div class="app-brand">
                <i class="fas fa-layer-group"></i>
                <span>Mensetsu</span>
            </div>
            <div class="global-actions">
                <button id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                <span class="divider"></span>
                <button id="logout-btn" title="Logout" class="danger-text"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <!-- TABS CONTENT -->
        <main class="content-area">
            <!-- REVIEW TAB -->
            <div id="view-review" class="view active">
                <div class="header">
                    <div class="stats">
                        <span id="progress-text">0 / 0</span>
                        <div class="stat-badges">
                            <div class="hafal-badge success-text" title="Hafal"><i class="fas fa-check-circle"></i>
                                <span id="hafal-count">0</span>
                            </div>
                            <div class="hafal-badge danger-text" title="Belum Hafal"><i class="fas fa-times-circle"></i>
                                <span id="belum-count">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="result-screen hidden" id="result-screen">
                    <div class="result-card">
                        <i class="fas fa-trophy result-icon"></i>
                        <h2>Review Selesai!</h2>
                        <div class="result-stats">
                            <div class="result-stat-item">
                                <span class="label">Total Hafal</span>
                                <span class="value success-text" id="final-hafal">0</span>
                            </div>
                            <div class="result-stat-item">
                                <span class="label">Belum Hafal</span>
                                <span class="value danger-text" id="final-belum">0</span>
                            </div>
                        </div>
                        <div class="result-actions">
                            <button id="study-unlearned-btn" class="btn-primary">Pelajari yang belum hafal (<span
                                    id="unlearned-count">0</span>)</button>
                            <button id="restart-progress-btn" class="btn-secondary">Restart/Reset Progress</button>
                        </div>
                    </div>
                </div>

                <div class="card-container" id="card-stage">
                    <div class="card" id="card">
                        <div class="face front">
                            <div class="front-header">
                                <button id="edit-card-btn-front" class="icon-btn primary-btn hidden"><i
                                        class="fas fa-edit"></i></button>
                            </div>
                            <div class="q-wrapper">
                                <div id="q-content" class="jp-text"></div>
                                <textarea id="q-edit" class="jp-edit hidden" placeholder="Tulis pertanyaan..."
                                    spellcheck="false"></textarea>
                            </div>
                            <div class="card-hint"><i class="fas fa-hand-pointer"></i> Tap to flip</div>
                        </div>
                        <div class="face back">
                            <div class="back-header">
                                <button id="edit-card-btn" class="icon-btn primary-btn hidden"><i
                                        class="fas fa-edit"></i></button>
                                <button id="delete-card-btn" class="icon-btn danger"><i
                                        class="fas fa-trash-alt"></i></button>
                            </div>
                            <div class="scroll-area">
                                <div id="chat-bubbles" class="chat-container">
                                    <!-- Bubbles generated by app.js -->
                                </div>
                                <div class="follow-up-actions">
                                    <button id="add-follow-q" class="mini-fab left" title="Add follow-up question"><i
                                            class="fas fa-plus"></i></button>
                                    <button id="add-follow-a" class="mini-fab right" title="Add follow-up answer"><i
                                            class="fas fa-plus"></i></button>
                                </div>

                                <div id="tips-container" class="tips-section hidden">
                                    <div class="tips-header">
                                        <button id="tip-edit-btn" class="tip-edit-btn"><i
                                                class="fas fa-pencil-alt"></i></button>
                                    </div>
                                    <div id="t-display" class="tips-display"></div>
                                    <textarea id="t-content" class="tips-edit hidden" placeholder="Tambahkan tips..."
                                        spellcheck="false"></textarea>
                                </div>
                                <button id="add-tips-btn" class="add-tips-btn hidden"><i class="fas fa-plus"></i>
                                    Tambahkan Tips / Catatan</button>

                                <!-- Legacy hidden edit fields for the primary answer -->
                                <textarea id="a-content" class="hidden"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="card-controls mid-controls">
                        <button id="undo-btn" title="Undo"><i class="fas fa-undo"></i></button>
                        <button id="shuffle-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                        <button id="reset-btn" title="Reset Progress"><i class="fas fa-sync-alt"></i></button>
                    </div>
                </div>

                <div class="status-actions-nav">
                    <div class="main-actions">
                        <button id="btn-belum" class="status-nav-btn belum"><i class="fas fa-times"></i> Belum</button>
                        <button id="btn-hafal" class="status-nav-btn hafal"><i class="fas fa-check"></i> Hafal</button>
                    </div>
                </div>
            </div>

            <!-- JIKOSHOUKAI TAB -->
            <div id="view-jikoshoukai" class="view">
                <div class="view-header">
                    <div class="jiko-header">
                        <div class="jiko-title-block">
                            <h1>自己紹介</h1>
                            <p>Self Introduction</p>
                        </div>
                        <div class="jiko-actions">
                            <button id="edit-jikoshoukai-btn" class="icon-btn primary-btn" title="Edit">
                                <i class="fas fa-edit"></i>
                            </button>
                            <div id="jikoshoukai-status" class="save-status hidden">
                                <i class="fas fa-cloud-upload-alt"></i> Saving...
                            </div>
                        </div>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="jikoshoukai-editor" placeholder="Tulis jikoshoukai anda di sini..."
                        readonly></textarea>
                </div>
            </div>

            <!-- CARD MANAGEMENT TAB -->
            <div id="view-cards" class="view">
                <div class="view-header">
                    <h1>Card Management</h1>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total Cards</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-hafal">0</span>
                            <span class="stat-label">Hafal</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-belum">0</span>
                            <span class="stat-label">Belum Hafal</span>
                        </div>
                    </div>
                </div>
                <div class="management-actions">
                    <div class="search-box">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="card-search" placeholder="Cari kartu...">
                    </div>
                </div>
                <div class="m-filter-tabs">
                    <button class="m-filter-tab active" data-filter="belum" onclick="setManagementFilter('belum')"
                        title="Belum Hafal">
                        <i class="fas fa-times-circle"></i> <span class="tab-count" id="count-belum">0</span>
                    </button>
                    <button class="m-filter-tab" data-filter="starred" onclick="setManagementFilter('starred')"
                        title="Starred">
                        <i class="fas fa-star"></i> <span class="tab-count" id="count-starred">0</span>
                    </button>
                    <button class="m-filter-tab" data-filter="hafal" onclick="setManagementFilter('hafal')"
                        title="Hafal">
                        <i class="fas fa-check-circle"></i> <span class="tab-count" id="count-hafal">0</span>
                    </button>
                    <button class="m-filter-tab" data-filter="arsip" onclick="setManagementFilter('arsip')"
                        title="Arsip">
                        <i class="fas fa-archive"></i> <span class="tab-count" id="count-arsip">0</span>
                    </button>
                </div>
                <div id="cards-list" class="cards-management-list"></div>
                <button id="add-card-btn" class="fab-btn" title="Add New Card"><i class="fas fa-plus"></i></button>
            </div>
        </main>

        <!-- NAVIGATION TAB BAR -->
        <nav class="tab-bar">
            <button class="tab-item active" data-target="view-review">
                <i class="fas fa-layer-group"></i>
                <span>Review</span>
            </button>
            <button class="tab-item" data-target="view-jikoshoukai">
                <i class="fas fa-id-card"></i>
                <span>Intro</span>
            </button>
            <button class="tab-item" data-target="view-cards">
                <i class="fas fa-th-list"></i>
                <span>Cards</span>
            </button>
        </nav>
    </div>

    <!-- CARD MODAL (Add/Edit) -->
    <div id="add-card-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-card-title">Add New Question</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Question</label>
                    <textarea id="new-q" placeholder="Contoh: 日本でのくらい働きたいですか？" spellcheck="false"></textarea>
                </div>
                <div class="input-group">
                    <label>Hint (Front Card Hint)</label>
                    <textarea id="new-h" placeholder="Petunjuk singkat yang muncul di kartu depan..."
                        spellcheck="false"></textarea>
                </div>
                <div class="input-group">
                    <label>Answer</label>
                    <textarea id="new-a" placeholder="Contoh: はい。できるだけ長く働きたいです。" spellcheck="false"></textarea>
                </div>
                <div class="input-group">
                    <label>Tips & Vocab (Optional)</label>
                    <textarea id="new-t" placeholder="Tambahkan daftar kosakata atau tips menjawab..."
                        spellcheck="false"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="add-modal-close" class="btn-secondary">Cancel</button>
                <button id="add-modal-save" class="btn-primary">Add Card</button>
            </div>
        </div>
    </div>

    <!-- FOLLOW-UP MODAL -->
    <div id="followup-modal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3 id="followup-modal-title">Add Follow-up</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label id="followup-label">Content</label>
                    <textarea id="followup-input" placeholder="Tulis di sini..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="followup-close-btn" class="btn-secondary">Batal</button>
                <button id="followup-save-btn" class="btn-primary">Tambah</button>
            </div>
        </div>
    </div>

    <!-- NOTE MODAL -->
    <div id="note-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="note-title" placeholder="Judul Catatan">
                <button id="modal-delete-btn" class="icon-btn danger"><i class="fas fa-trash"></i></button>
            </div>
            <textarea id="note-body" placeholder="Tulis sesuatu..."></textarea>
            <div class="modal-footer">
                <button id="modal-close-btn" class="btn-secondary">Close</button>
                <button id="modal-save-btn" class="btn-primary">Save Note</button>
            </div>
        </div>
    </div>

    <!-- CUSTOM ALERT/CONFIRM MODAL -->
    <div id="custom-alert" class="modal">
        <div class="modal-content small alert-box">
            <div class="modal-header">
                <h3 id="alert-title">Notification</h3>
            </div>
            <div id="alert-message" class="alert-message">Message here...</div>
            <div class="modal-footer">
                <button id="alert-cancel" class="btn-secondary hidden">Batal</button>
                <button id="alert-ok" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
