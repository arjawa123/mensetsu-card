<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mensetsu Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- TABS CONTENT -->
        <main class="content-area">
            <!-- REVIEW TAB -->
            <div id="view-review" class="view active">
                <div class="header">
                    <div class="stats">
                        <span id="progress-text">0 / 0</span>
                        <div class="hafal-badge"><i class="fas fa-check-circle"></i> <span id="hafal-count">0</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                        <button id="shuffle-btn" title="Shuffle"><i class="fas fa-random"></i></button>
                        <button id="reset-btn" title="Reset Progress"><i class="fas fa-redo"></i></button>
                        <button id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </div>

                <div class="card-container">
                    <div class="card" id="card">
                        <div class="face front">
                            <div class="front-header">
                                <button id="edit-card-btn-front" class="icon-btn primary-btn"><i
                                        class="fas fa-edit"></i></button>
                            </div>
                            <div class="q-wrapper">
                                <div id="q-content" class="jp-text"></div>
                                <textarea id="q-edit" class="jp-edit hidden" placeholder="Tulis pertanyaan..."
                                    spellcheck="false"></textarea>
                            </div>
                            <div class="card-hint"><i class="fas fa-hand-pointer"></i> Tap to flip</div>
                        </div>
                        <div class="face back">
                            <div class="back-header">
                                <button id="edit-card-btn" class="icon-btn primary-btn"><i
                                        class="fas fa-edit"></i></button>
                                <button id="delete-card-btn" class="icon-btn danger"><i
                                        class="fas fa-trash-alt"></i></button>
                            </div>
                            <div class="scroll-area">
                                <div id="chat-bubbles" class="chat-container">
                                    <!-- Bubbles generated by app.js -->
                                </div>
                                <div class="follow-up-actions">
                                    <button id="add-follow-q" class="mini-fab left" title="Add follow-up question"><i
                                            class="fas fa-plus"></i></button>
                                    <button id="add-follow-a" class="mini-fab right" title="Add follow-up answer"><i
                                            class="fas fa-plus"></i></button>
                                </div>

                                <div id="tips-container" class="tips-section hidden">
                                    <div id="t-display" class="tips-display"></div>
                                    <textarea id="t-content" class="tips-edit hidden" placeholder="Tambahkan tips..."
                                        spellcheck="false"></textarea>
                                </div>
                                <button id="add-tips-btn" class="add-tips-btn hidden"><i class="fas fa-plus"></i>
                                    Tambahkan Tips / Catatan</button>

                                <!-- Legacy hidden edit fields for the primary answer -->
                                <textarea id="a-content" class="hidden"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="status-actions-nav">
                    <button id="btn-belum" class="status-nav-btn belum"><i class="fas fa-times"></i> Belum</button>
                    <button id="btn-hafal" class="status-nav-btn hafal"><i class="fas fa-check"></i> Hafal</button>
                </div>
            </div>

            <!-- JIKOSHOUKAI TAB -->
            <div id="view-jikoshoukai" class="view">
                <div class="view-header">
                    <div class="header-with-action">
                        <div>
                            <h1>自己紹介</h1>
                            <p>Self Introduction</p>
                        </div>
                        <button id="edit-jikoshoukai-btn" class="icon-btn primary-btn"><i
                                class="fas fa-edit"></i></button>
                    </div>
                </div>
                <div class="editor-container">
                    <textarea id="jikoshoukai-editor" placeholder="Tulis jikoshoukai anda di sini..."
                        readonly></textarea>
                    <div id="jikoshoukai-status" class="save-status hidden"><i class="fas fa-cloud-upload-alt"></i>
                        Auto-saving...</div>
                </div>
            </div>

            <!-- CARD MANAGEMENT TAB -->
            <div id="view-cards" class="view">
                <div class="view-header">
                    <h1>Card Management</h1>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="stat-total">0</span>
                            <span class="stat-label">Total Cards</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-hafal">0</span>
                            <span class="stat-label">Hafal</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="stat-fu">0</span>
                            <span class="stat-label">Follow-ups</span>
                        </div>
                    </div>
                </div>
                <div class="management-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="card-search" placeholder="Cari...">
                    </div>
                    <button id="add-card-btn" title="Add New Card"><i class="fas fa-plus"></i></button>
                </div>
                <div id="cards-list" class="cards-management-list"></div>
            </div>
        </main>

        <!-- NAVIGATION TAB BAR -->
        <nav class="tab-bar">
            <button class="tab-item active" data-target="view-review">
                <i class="fas fa-layer-group"></i>
                <span>Review</span>
            </button>
            <button class="tab-item" data-target="view-jikoshoukai">
                <i class="fas fa-id-card"></i>
                <span>Intro</span>
            </button>
            <button class="tab-item" data-target="view-cards">
                <i class="fas fa-th-list"></i>
                <span>Cards</span>
            </button>
        </nav>
    </div>

    <!-- ADD CARD MODAL -->
    <div id="add-card-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Question</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Question</label>
                    <textarea id="new-q" placeholder="Enter question..."></textarea>
                </div>
                <div class="input-group">
                    <label>Answer</label>
                    <textarea id="new-a" placeholder="Enter answer..."></textarea>
                </div>
                <div class="input-group">
                    <label>Tips & Vocab (Optional)</label>
                    <textarea id="new-t" placeholder="Enter tips..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="add-modal-close" class="btn-secondary">Cancel</button>
                <button id="add-modal-save" class="btn-primary">Add Card</button>
            </div>
        </div>
    </div>

    <!-- FOLLOW-UP MODAL -->
    <div id="followup-modal" class="modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h3 id="followup-modal-title">Add Follow-up</h3>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label id="followup-label">Content</label>
                    <textarea id="followup-input" placeholder="Tulis di sini..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="followup-close-btn" class="btn-secondary">Batal</button>
                <button id="followup-save-btn" class="btn-primary">Tambah</button>
            </div>
        </div>
    </div>

    <!-- NOTE MODAL -->
    <div id="note-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="note-title" placeholder="Judul Catatan">
                <button id="modal-delete-btn" class="icon-btn danger"><i class="fas fa-trash"></i></button>
            </div>
            <textarea id="note-body" placeholder="Tulis sesuatu..."></textarea>
            <div class="modal-footer">
                <button id="modal-close-btn" class="btn-secondary">Close</button>
                <button id="modal-save-btn" class="btn-primary">Save Note</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
